openapi: 3.1.0
info:
  title: Oblivion Partner API
  version: 0.1.0
  description: Trust-minimized personal information removal rail for embedded partners.
servers:
  - url: https://api.oblivion.example
security:
  - bearerAuth: []
paths:
  /v1/cases:
    post:
      summary: Create cleanup case
      tags: [Cases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jurisdiction, authorityBasis]
              properties:
                jurisdiction: { type: string, enum: [US, EU, UK] }
                authorityBasis: { type: string }
                externalRef: { type: string }
                callbackUrl: { type: string, format: uri }
      responses:
        "201": { description: Case created }
    get:
      summary: List partner cases
      tags: [Cases]
      parameters:
        - name: externalRef
          in: query
          schema: { type: string }
      responses:
        "200": { description: Case list }
  /v1/cases/{caseId}/intake:
    post:
      summary: Submit encrypted intake (user browser)
      tags: [Cases]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Intake stored }
  /v1/cases/{caseId}/preset:
    post:
      summary: Apply cleanup preset
      tags: [Workflow]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [presetId]
              properties:
                presetId:
                  type: string
                  enum: [people-search-cleanup, breach-exposure]
      responses:
        "201": { description: Plan started }
  /v1/cases/{caseId}/discover:
    post:
      summary: Discover exposure candidates
      tags: [Workflow]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "201": { description: Discovery complete }
  /v1/cases/{caseId}:
    delete:
      summary: Delete partner case and purge stored data
      tags: [Cases]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Case deleted }
  /v1/cases/{caseId}/run:
    post:
      summary: Advance agent one step
      tags: [Workflow]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Step result }
  /v1/cases/{caseId}/run-until-blocked:
    post:
      summary: Advance agent until approval gate or completion
      tags: [Workflow]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                maxIterations: { type: integer, minimum: 1, maximum: 50, default: 12 }
      responses:
        "200": { description: Run result with stoppedBecause }
  /v1/cases/{caseId}/status:
    get:
      summary: Partner status aggregate
      tags: [Status]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Status view }
  /v1/cases/{caseId}/risk-summary:
    get:
      summary: Exposure summary (not a credit score)
      tags: [Status]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Risk summary }
  /v1/approvals/{approvalId}/approve:
    post:
      summary: User approves disclosure (requires userConfirmation)
      tags: [Approvals]
      parameters:
        - name: approvalId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userConfirmation]
              properties:
                userConfirmation: { type: string, minLength: 8 }
      responses:
        "200": { description: Approved }
  /v1/actions/{actionId}/execute:
    post:
      summary: Execute approved action (browser handoff)
      tags: [Approvals]
      parameters:
        - name: actionId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Executed or recorded }
  /v1/presets:
    get:
      summary: List partner-allowed cleanup presets
      tags: [Workflow]
      responses:
        "200": { description: Preset catalog }
  /v1/partners/me:
    get:
      summary: Partner profile and billing summary
      tags: [Partners]
      responses:
        "200":
          description: Partner record
          content:
            application/json:
              schema:
                type: object
                properties:
                  partner:
                    type: object
                    properties:
                      id: { type: string }
                      environment: { type: string, enum: [production, sandbox] }
                      balanceCredits: { type: integer }
                      webhookUrl: { type: string, nullable: true }
                      keyRotatedAt: { type: string, format: date-time, nullable: true }
  /v1/partners/me/rotate-key:
    post:
      summary: Rotate API key (shown once)
      tags: [Partners]
      responses:
        "200":
          description: New API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  partnerId: { type: string }
                  environment: { type: string, enum: [production, sandbox] }
                  apiKey: { type: string }
                  keyRotatedAt: { type: string, format: date-time }
                  warning: { type: string }
  /v1/webhooks/register-inbox:
    post:
      summary: Register built-in webhook inbox (dev)
      tags: [Webhooks]
      responses:
        "200": { description: Inbox URL registered }
  /v1/partners/me/webhook-inbox:
    get:
      summary: List webhooks received by inbox
      tags: [Webhooks]
      responses:
        "200": { description: Inbox entries }
  /v1/webhooks:
    post:
      summary: Register webhook endpoint
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                secret: { type: string }
                events: { type: array, items: { type: string } }
      responses:
        "200": { description: Webhook registered }
  /v1/partners/me/usage:
    get:
      summary: Usage and credit consumption
      tags: [Billing]
      responses:
        "200": { description: Usage summary }
  /v1/billing/balance:
    get:
      summary: Credit balance and meter rates
      tags: [Billing]
      responses:
        "200": { description: Balance view }
  /v1/billing/invoices:
    get:
      summary: List closed invoices
      tags: [Billing]
      responses:
        "200": { description: Invoice list }
  /v1/billing/invoices/close:
    post:
      summary: Close billing period (YYYY-MM)
      tags: [Billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [period]
              properties:
                period: { type: string, pattern: "^\\d{4}-\\d{2}$" }
      responses:
        "200": { description: Closed invoice }
  /v1/billing/invoices/{invoiceId}:
    get:
      summary: Invoice detail with line items
      tags: [Billing]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Invoice detail }
  /v1/cases/{caseId}/export:
    get:
      summary: Redacted case export (audit logged)
      tags: [Cases]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Partner-safe export bundle }
  /v1/partners/me/data-access:
    get:
      summary: Export/delete audit trail
      tags: [Partners]
      parameters:
        - name: caseId
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: Audit events }
  /v1/webhooks/deliveries:
    get:
      summary: Webhook delivery log (retry dashboard)
      tags: [Webhooks]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, delivered, failed] }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: Delivery list }
  /v1/webhooks/deliveries/{deliveryId}/retry:
    post:
      summary: Retry one failed delivery
      tags: [Webhooks]
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Retry result }
  /v1/webhooks/deliveries/retry-failed:
    post:
      summary: Batch retry failed deliveries
      tags: [Webhooks]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit: { type: integer, default: 10 }
      responses:
        "200": { description: Batch retry result }
  /v1/trust/attestation:
    get:
      summary: TEE attestation proof (public)
      tags: [Trust]
      security: []
      responses:
        "200": { description: Attestation proof }
  /v1/trust/runtime:
    get:
      summary: Runtime mode badge for partner UI
      tags: [Trust]
      security: []
      responses:
        "200": { description: Runtime badge }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer